name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm run build
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_pass
          MYSQL_DATABASE: zeel_platform
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pci_root_pass"
          --health-interval=8s
          --health-timeout=5s
          --health-retries=15
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ci_root_pass
      MYSQL_DATABASE: zeel_platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - name: Import MySQL schema
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          for i in $(seq 1 40); do mysqladmin ping -h127.0.0.1 -uroot -pci_root_pass --silent && break; sleep 2; done
          mysql -h127.0.0.1 -uroot -pci_root_pass -e "CREATE DATABASE IF NOT EXISTS zeel_platform;"
          mysql -h127.0.0.1 -uroot -pci_root_pass zeel_platform < database/schema.sql
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
